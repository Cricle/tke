name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Test
        run: cargo test --quiet

      - name: Build release
        run: cargo build --release

      - name: Verify Claude harness
        run: bash scripts/verify_claude_harness.sh

      - name: Benchmark check
        run: ./target/release/tke-bench benchmark-commands --check
