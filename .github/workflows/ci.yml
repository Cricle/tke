name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: CI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Test
        run: cargo test --quiet

      - name: Build release
        run: cargo build --release

      - name: Verify Claude harness
        if: runner.os == 'Linux'
        run: bash scripts/verify_claude_harness.sh

      - name: Benchmark check
        if: runner.os == 'Linux'
        run: ./target/release/tke-bench benchmark-commands --check
