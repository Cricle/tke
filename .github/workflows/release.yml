name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64-musl
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive_name: tke-linux-x86_64-musl.tar.gz
            bin_tke: target/x86_64-unknown-linux-musl/release/tke
            bin_bench: target/x86_64-unknown-linux-musl/release/tke-bench
          - name: macos-x86_64
            os: macos-13
            target: x86_64-apple-darwin
            archive_name: tke-macos-x86_64.tar.gz
            bin_tke: target/x86_64-apple-darwin/release/tke
            bin_bench: target/x86_64-apple-darwin/release/tke-bench
          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            archive_name: tke-macos-aarch64.tar.gz
            bin_tke: target/aarch64-apple-darwin/release/tke
            bin_bench: target/aarch64-apple-darwin/release/tke-bench
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_name: tke-windows-x86_64.zip
            bin_tke: target/x86_64-pc-windows-msvc/release/tke.exe
            bin_bench: target/x86_64-pc-windows-msvc/release/tke-bench.exe
            rustflags: -C target-feature=+crt-static

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        shell: bash
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist/${{ matrix.name }}
          cp "${{ matrix.bin_tke }}" dist/${{ matrix.name }}/tke
          cp "${{ matrix.bin_bench }}" dist/${{ matrix.name }}/tke-bench
          cp README.md dist/${{ matrix.name }}/README.md
          tar -czf "dist/${{ matrix.archive_name }}" -C dist "${{ matrix.name }}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "dist/${{ matrix.archive_name }}" > "dist/${{ matrix.archive_name }}.sha256"
          else
            shasum -a 256 "dist/${{ matrix.archive_name }}" > "dist/${{ matrix.archive_name }}.sha256"
          fi

      - name: Package windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist/${{ matrix.name }}" | Out-Null
          Copy-Item "${{ matrix.bin_tke }}" "dist/${{ matrix.name }}/tke.exe"
          Copy-Item "${{ matrix.bin_bench }}" "dist/${{ matrix.name }}/tke-bench.exe"
          Copy-Item "README.md" "dist/${{ matrix.name }}/README.md"
          Compress-Archive -Path "dist/${{ matrix.name }}/*" -DestinationPath "dist/${{ matrix.archive_name }}"
          $hash = (Get-FileHash "dist/${{ matrix.archive_name }}" -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path "dist/${{ matrix.archive_name }}.sha256" -Value "$hash  ${{ matrix.archive_name }}"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          if-no-files-found: error
          path: |
            dist/${{ matrix.archive_name }}
            dist/${{ matrix.archive_name }}.sha256

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
